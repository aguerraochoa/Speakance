name: Speakance
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.andresguerra.speakance
    SWIFT_VERSION: 5.9
targets:
  Speakance:
    type: application
    platform: iOS
    configFiles:
      Debug: Config/AppConfig.xcconfig
      Release: Config/AppConfig.xcconfig
    sources:
      - path: Sources
      - path: Assets.xcassets
        buildPhase: resources
      - path: PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: 5LCHUR9CDA
        INFOPLIST_KEY_CFBundleDisplayName: Speakance
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIRequiredDeviceCapabilities:
          - arm64
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Speakance uses the microphone so you can record expense entries by voice.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: Speakance may use speech recognition to transcribe your expense recordings.
    info:
      path: Info.plist
      properties:
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        WEB_AUTH_BASE_HOST: $(WEB_AUTH_BASE_HOST)
        WEB_AUTH_BASE_URL: $(WEB_AUTH_BASE_URL)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSupportsIndirectInputEvents: true

  SpeakanceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Speakance
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
